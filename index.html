<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculadora de distancia, tiempo y ritmo</title>
  <style>
    :root{
      --bg:#f5f7fa;
      --card:#ffffff;
      --text:#1f2933;
      --muted:#6b7280;
      --border:#e5e7eb;
      --soft:#f9fafb;
      --highlight:#dbeafe;
      --highlight-border:#93c5fd;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--text);
    }

    .wrap{
      max-width:1180px;
      margin:20px auto;
      padding:10px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
      box-shadow:0 4px 14px rgba(15,23,42,0.04);
    }

    .section-title{
      margin-bottom:14px;
    }

    .section-title h2{
      margin:0;
      font-size:1rem;
    }

    .grid-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
      align-items:start;
    }

    .subgrid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .subgrid-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
    }

    @media (max-width: 980px){
      .grid-3{grid-template-columns:1fr;}
    }

    @media (max-width: 560px){
      .subgrid-2,.subgrid-3{grid-template-columns:1fr;}
    }

    .block{
      background:var(--soft);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
    }

    label{
      display:block;
      font-size:0.82rem;
      color:var(--muted);
      margin-bottom:4px;
    }

    .block-title{
      font-size:0.9rem;
      font-weight:600;
      margin-bottom:8px;
      color:var(--text);
    }

    input{
      width:100%;
      padding:8px 9px;
      border:1px solid var(--border);
      border-radius:8px;
      font-size:0.92rem;
      background:#fff;
      color:var(--text);
      margin-bottom:6px;
      transition:background-color .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    input.highlight{
      background:var(--highlight);
      border-color:var(--highlight-border);
      box-shadow:0 0 0 3px rgba(147,197,253,0.25);
    }

    .quick-buttons{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:4px;
      margin-bottom:8px;
    }

    .quick-btn, .action-btn, .calc-btn{
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      border-radius:999px;
      padding:7px 10px;
      font-size:0.84rem;
      cursor:pointer;
    }

    .quick-btn:hover, .action-btn:hover, .calc-btn:hover{
      background:#eef2f7;
    }

    .calc-btn{
      margin-top:4px;
      width:100%;
      border-radius:10px;
      font-weight:600;
    }

    .divider{
      height:1px;
      background:var(--border);
      margin:14px 0;
    }

    .kpi{
      display:flex;
      justify-content:space-between;
      gap:14px;
      margin:10px 0;
      font-size:0.95rem;
    }

    .kpi span:last-child{
      font-weight:600;
      text-align:right;
    }

    .helper{
      font-size:0.84rem;
      line-height:1.5;
      color:var(--muted);
      background:var(--soft);
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px 12px;
      margin-top:10px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="section-title">
        <h2>Calculadora de distancia, tiempo y ritmo</h2>
      </div>

      <div class="grid-3">
        <div class="block">
          <div class="block-title">Distancia</div>

          <div class="subgrid-2">
            <div>
              <label>Kilómetros</label>
              <input type="number" id="distanceKm" min="0" step="1">
            </div>
            <div>
              <label>Metros</label>
              <input type="number" id="distanceM" min="0" max="999" step="1">
            </div>
          </div>

          <div class="quick-buttons">
            <button type="button" class="quick-btn" data-km="5" data-m="0">5 km</button>
            <button type="button" class="quick-btn" data-km="10" data-m="0">10 km</button>
            <button type="button" class="quick-btn" data-km="21" data-m="97">Media</button>
            <button type="button" class="quick-btn" data-km="42" data-m="195">Maratón</button>
          </div>

          <button type="button" class="calc-btn" id="btnDistance">Calcular distancia</button>
        </div>

        <div class="block">
          <div class="block-title">Tiempo</div>

          <div class="subgrid-3">
            <div>
              <label>Horas</label>
              <input type="number" id="timeH" min="0" step="1">
            </div>
            <div>
              <label>Minutos</label>
              <input type="number" id="timeMin" min="0" max="59" step="1">
            </div>
            <div>
              <label>Segundos</label>
              <input type="number" id="timeSec" min="0" max="59" step="1">
            </div>
          </div>

          <button type="button" class="calc-btn" id="btnTime">Calcular tiempo</button>
        </div>

        <div class="block">
          <div class="block-title">Ritmo</div>

          <div class="subgrid-2">
            <div>
              <label>Min/km</label>
              <input type="number" id="paceMin" min="0" step="1">
            </div>
            <div>
              <label>Seg/km</label>
              <input type="number" id="paceSec" min="0" max="59" step="1">
            </div>
          </div>

          <button type="button" class="calc-btn" id="btnPace">Calcular ritmo</button>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="action-btn" id="clearAllBtn">Borrar todo</button>
      </div>

      <div class="divider"></div>

      <div class="kpi">
        <span>Estado</span>
        <span id="resultText">Pulsa el botón del valor que quieras calcular.</span>
      </div>

      <div class="helper">
        Introduce dos variables y pulsa el botón del parámetro que quieras recalcular. El valor calculado se sobrescribe directamente.
      </div>
    </div>
  </div>

  <script>
    function val(id){
      const raw = document.getElementById(id).value;
      if (raw === "") return null;
      const n = parseFloat(raw);
      return isFinite(n) ? n : null;
    }

    function setVal(id, value){
      document.getElementById(id).value = value;
    }

    function clearVal(id){
      document.getElementById(id).value = "";
    }

    function setMessage(text){
      document.getElementById("resultText").textContent = text;
    }

    function clearHighlights(){
      document.querySelectorAll("input").forEach(input => {
        input.classList.remove("highlight");
      });
    }

    function highlightFields(ids){
      clearHighlights();
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add("highlight");
      });
      setTimeout(() => {
        ids.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.classList.remove("highlight");
        });
      }, 1600);
    }

    function getDistanceKm(){
      const km = val("distanceKm");
      const m = val("distanceM");

      if (km === null && m === null) return null;

      const kmPart = km === null ? 0 : km;
      const mPart = m === null ? 0 : m;

      if (kmPart < 0 || mPart < 0) return null;

      return kmPart + (mPart / 1000);
    }

    function setDistance(totalKm){
      if (totalKm === null || !isFinite(totalKm) || totalKm <= 0) return false;

      const totalMeters = Math.round(totalKm * 1000);
      const km = Math.floor(totalMeters / 1000);
      const m = totalMeters % 1000;

      setVal("distanceKm", km);
      setVal("distanceM", m);
      highlightFields(["distanceKm", "distanceM"]);
      return true;
    }

    function getTimeHours(){
      const h = val("timeH");
      const m = val("timeMin");
      const s = val("timeSec");

      if (h === null && m === null && s === null) return null;

      const hh = h === null ? 0 : h;
      const mm = m === null ? 0 : m;
      const ss = s === null ? 0 : s;

      if (hh < 0 || mm < 0 || ss < 0) return null;

      return hh + (mm / 60) + (ss / 3600);
    }

    function setTime(hours){
      if (hours === null || !isFinite(hours) || hours <= 0) return false;

      const totalSeconds = Math.round(hours * 3600);
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;

      setVal("timeH", h);
      setVal("timeMin", m);
      setVal("timeSec", s);
      highlightFields(["timeH", "timeMin", "timeSec"]);
      return true;
    }

    function getPaceMinPerKm(){
      const m = val("paceMin");
      const s = val("paceSec");

      if (m === null && s === null) return null;

      const mm = m === null ? 0 : m;
      const ss = s === null ? 0 : s;

      if (mm < 0 || ss < 0 || ss >= 60) return null;

      return mm + (ss / 60);
    }

    function setPace(minPerKm){
      if (minPerKm === null || !isFinite(minPerKm) || minPerKm <= 0) return false;

      const totalSeconds = Math.round(minPerKm * 60);
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;

      setVal("paceMin", m);
      setVal("paceSec", s);
      highlightFields(["paceMin", "paceSec"]);
      return true;
    }

    function calculateDistance(){
      const time = getTimeHours();
      const pace = getPaceMinPerKm();

      if (time !== null && pace !== null){
        const distance = (time * 60) / pace;
        if (setDistance(distance)){
          setMessage("Distancia calculada a partir del tiempo y el ritmo.");
          return;
        }
      }

      setMessage("Necesitas introducir tiempo y ritmo para calcular la distancia.");
    }

    function calculateTime(){
      const distance = getDistanceKm();
      const pace = getPaceMinPerKm();

      if (distance !== null && pace !== null){
        const time = (distance * pace) / 60;
        if (setTime(time)){
          setMessage("Tiempo calculado a partir de la distancia y el ritmo.");
          return;
        }
      }

      setMessage("Necesitas introducir distancia y ritmo para calcular el tiempo.");
    }

    function calculatePace(){
      const distance = getDistanceKm();
      const time = getTimeHours();

      if (distance !== null && time !== null){
        const pace = (time * 60) / distance;
        if (setPace(pace)){
          setMessage("Ritmo calculado a partir de la distancia y el tiempo.");
          return;
        }
      }

      setMessage("Necesitas introducir distancia y tiempo para calcular el ritmo.");
    }

    document.querySelectorAll(".quick-btn").forEach(btn => {
      btn.addEventListener("click", function(){
        setVal("distanceKm", this.dataset.km);
        setVal("distanceM", this.dataset.m);
        highlightFields(["distanceKm", "distanceM"]);
        setMessage("Distancia actualizada. Pulsa el botón del valor que quieras calcular.");
      });
    });

    document.getElementById("btnDistance").addEventListener("click", calculateDistance);
    document.getElementById("btnTime").addEventListener("click", calculateTime);
    document.getElementById("btnPace").addEventListener("click", calculatePace);

    document.getElementById("clearAllBtn").addEventListener("click", function(){
      clearVal("distanceKm");
      clearVal("distanceM");
      clearVal("timeH");
      clearVal("timeMin");
      clearVal("timeSec");
      clearVal("paceMin");
      clearVal("paceSec");
      clearHighlights();
      setMessage("Todos los campos se han borrado.");
    });
  </script>
</body>
</html>
