<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculadora de distancia, tiempo y ritmo</title>

  <style>
    :root{
      --bg:#f5f7fa;
      --card:#ffffff;
      --text:#1f2933;
      --muted:#6b7280;
      --border:#e5e7eb;
      --soft:#f9fafb;

      --highlight:#dbeafe;
      --highlight-border:#93c5fd;

      --success:#dcfce7;
      --success-border:#86efac;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:20px auto;
      padding:10px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
      box-shadow:0 4px 14px rgba(15,23,42,0.04);
    }

    h2{
      margin:0 0 12px 0;
      font-size:1rem;
    }

    .grid-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
    }

    .calc-row{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    @media (max-width: 900px){
      .grid-3, .calc-row{grid-template-columns:1fr;}
    }

    .block{
      background:var(--soft);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
    }

    .block-title{
      font-size:0.9rem;
      font-weight:600;
      margin-bottom:10px;
    }

    .field-label{
      display:block;
      font-size:0.82rem;
      color:var(--muted);
      margin:0 0 4px 0;
    }

    .subgrid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .subgrid-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
    }

    @media (max-width: 560px){
      .subgrid-2,.subgrid-3{grid-template-columns:1fr;}
    }

    input{
      width:100%;
      padding:8px;
      border:1px solid var(--border);
      border-radius:8px;
      margin-bottom:8px;
      transition:.2s;
      background:#fff;
      color:var(--text);
    }

    input.highlight{
      background:var(--highlight);
      border-color:var(--highlight-border);
      box-shadow:0 0 0 3px rgba(147,197,253,0.25);
    }

    input.success{
      background:var(--success);
      border-color:var(--success-border);
      box-shadow:0 0 0 3px rgba(134,239,172,0.25);
    }

    .quick-buttons{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    button{
      border:1px solid var(--border);
      background:#fff;
      border-radius:999px;
      padding:6px 10px;
      cursor:pointer;
      font-size:0.84rem;
    }

    button:hover{
      background:#eef2f7;
    }

    .calc-btn{
      width:100%;
      border-radius:10px;
      font-weight:600;
    }

    .actions{
      margin-top:12px;
    }

    .status{
      margin-top:12px;
      font-size:0.9rem;
      color:var(--text);
    }
  </style>
</head>

<body>
<div class="wrap">
<div class="card">

<h2>Calculadora de distancia, tiempo y ritmo</h2>

<div class="grid-3">

  <!-- DISTANCIA -->
  <div class="block">
    <div class="block-title">Distancia</div>

    <div class="subgrid-2">
      <div>
        <label class="field-label" for="distanceKm">Kilómetros</label>
        <input id="distanceKm" type="number">
      </div>
      <div>
        <label class="field-label" for="distanceM">Metros</label>
        <input id="distanceM" type="number">
      </div>
    </div>

    <div class="quick-buttons">
      <button data-km="5" data-m="0">5 km</button>
      <button data-km="10" data-m="0">10 km</button>
      <button data-km="21" data-m="97">Media</button>
      <button data-km="42" data-m="195">Maratón</button>
    </div>
  </div>

  <!-- TIEMPO -->
  <div class="block">
    <div class="block-title">Tiempo</div>

    <div class="subgrid-3">
      <div>
        <label class="field-label" for="timeH">Horas</label>
        <input id="timeH" type="number">
      </div>
      <div>
        <label class="field-label" for="timeMin">Minutos</label>
        <input id="timeMin" type="number">
      </div>
      <div>
        <label class="field-label" for="timeSec">Segundos</label>
        <input id="timeSec" type="number">
      </div>
    </div>
  </div>

  <!-- RITMO -->
  <div class="block">
    <div class="block-title">Ritmo</div>

    <div class="subgrid-2">
      <div>
        <label class="field-label" for="paceMin">Minutos por km</label>
        <input id="paceMin" type="number">
      </div>
      <div>
        <label class="field-label" for="paceSec">Segundos por km</label>
        <input id="paceSec" type="number">
      </div>
    </div>
  </div>

</div>

<div class="calc-row">
  <button class="calc-btn" id="btnDistance">Calcular distancia</button>
  <button class="calc-btn" id="btnTime">Calcular tiempo</button>
  <button class="calc-btn" id="btnPace">Calcular ritmo</button>
</div>

<div class="actions">
  <button id="clearAll">Borrar todo</button>
</div>

<div class="status" id="status">Pulsa un botón para calcular</div>

</div>
</div>

<script>
let currentSuccessFields = [];

function v(id){
  const x = document.getElementById(id).value;
  return x === "" ? null : parseFloat(x);
}

function set(id, val){
  document.getElementById(id).value = val;
}

function clearAllSuccess(){
  document.querySelectorAll("input").forEach(el => el.classList.remove("success"));
  currentSuccessFields = [];
}

function clearAllHighlight(){
  document.querySelectorAll("input").forEach(el => el.classList.remove("highlight"));
}

function highlight(ids){
  clearAllHighlight();
  ids.forEach(id => {
    const el = document.getElementById(id);
    el.classList.add("highlight");
    setTimeout(() => el.classList.remove("highlight"), 1000);
  });
}

function setSuccess(ids){
  clearAllSuccess();
  ids.forEach(id => {
    const el = document.getElementById(id);
    el.classList.add("success");
  });
  currentSuccessFields = [...ids];
}

function handleManualEdit(){
  clearAllSuccess();
}

function distance(){
  const km = v("distanceKm") || 0;
  const m = v("distanceM") || 0;
  if (km === 0 && m === 0) return null;
  return km + m / 1000;
}

function time(){
  const h = v("timeH") || 0;
  const m = v("timeMin") || 0;
  const s = v("timeSec") || 0;
  if (h === 0 && m === 0 && s === 0) return null;
  return h + m / 60 + s / 3600;
}

function pace(){
  const m = v("paceMin") || 0;
  const s = v("paceSec") || 0;
  if (m === 0 && s === 0) return null;
  return m + s / 60;
}

function setDistance(d){
  const total = Math.round(d * 1000);
  set("distanceKm", Math.floor(total / 1000));
  set("distanceM", total % 1000);
  setSuccess(["distanceKm", "distanceM"]);
}

function setTime(t){
  const sec = Math.round(t * 3600);
  set("timeH", Math.floor(sec / 3600));
  set("timeMin", Math.floor((sec % 3600) / 60));
  set("timeSec", sec % 60);
  setSuccess(["timeH", "timeMin", "timeSec"]);
}

function setPace(p){
  const sec = Math.round(p * 60);
  set("paceMin", Math.floor(sec / 60));
  set("paceSec", sec % 60);
  setSuccess(["paceMin", "paceSec"]);
}

function msg(t){
  document.getElementById("status").innerText = t;
}

document.getElementById("btnDistance").onclick = () => {
  const t = time();
  const p = pace();
  if (t && p){
    setDistance((t * 60) / p);
    msg("Distancia calculada");
  } else {
    msg("Introduce tiempo y ritmo para calcular la distancia");
  }
};

document.getElementById("btnTime").onclick = () => {
  const d = distance();
  const p = pace();
  if (d && p){
    setTime((d * p) / 60);
    msg("Tiempo calculado");
  } else {
    msg("Introduce distancia y ritmo para calcular el tiempo");
  }
};

document.getElementById("btnPace").onclick = () => {
  const d = distance();
  const t = time();
  if (d && t){
    setPace((t * 60) / d);
    msg("Ritmo calculado");
  } else {
    msg("Introduce distancia y tiempo para calcular el ritmo");
  }
};

document.querySelectorAll(".quick-buttons button").forEach(b => {
  b.onclick = () => {
    clearAllSuccess();
    set("distanceKm", b.dataset.km);
    set("distanceM", b.dataset.m);
    highlight(["distanceKm", "distanceM"]);
    msg("Distancia actualizada");
  };
});

document.querySelectorAll("input").forEach(input => {
  input.addEventListener("input", handleManualEdit);
});

document.getElementById("clearAll").onclick = () => {
  document.querySelectorAll("input").forEach(i => {
    i.value = "";
    i.classList.remove("success");
    i.classList.remove("highlight");
  });
  currentSuccessFields = [];
  msg("Todo borrado");
};
</script>
</body>
</html>
