<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculadora de distancia, tiempo y ritmo</title>
  <style>
    :root{
      --bg:#f5f7fa;
      --card:#ffffff;
      --text:#1f2933;
      --muted:#6b7280;
      --border:#e5e7eb;
      --soft:#f9fafb;
      --highlight:#dbeafe;
      --highlight-border:#93c5fd;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--text);
    }

    .wrap{
      max-width:1180px;
      margin:20px auto;
      padding:10px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
      box-shadow:0 4px 14px rgba(15,23,42,0.04);
    }

    .section-title{
      margin-bottom:14px;
    }

    .section-title h2{
      margin:0;
      font-size:1rem;
    }

    .grid-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
    }

    .subgrid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .subgrid-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
    }

    .calc-row{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    @media (max-width: 980px){
      .grid-3,
      .calc-row{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 560px){
      .subgrid-2,.subgrid-3{grid-template-columns:1fr;}
    }

    .block{
      background:var(--soft);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
    }

    .block-title{
      font-size:0.9rem;
      font-weight:600;
      margin-bottom:8px;
    }

    label{
      font-size:0.82rem;
      color:var(--muted);
    }

    input{
      width:100%;
      padding:8px;
      border:1px solid var(--border);
      border-radius:8px;
      margin-bottom:6px;
      transition:.2s;
    }

    input.highlight{
      background:var(--highlight);
      border-color:var(--highlight-border);
      box-shadow:0 0 0 3px rgba(147,197,253,0.25);
    }

    .quick-buttons{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    button{
      border:1px solid var(--border);
      background:#fff;
      border-radius:999px;
      padding:6px 10px;
      cursor:pointer;
      font-size:0.84rem;
    }

    button:hover{
      background:#eef2f7;
    }

    .calc-btn{
      width:100%;
      border-radius:10px;
      font-weight:600;
    }

    .actions{
      margin-top:12px;
    }

    .kpi{
      margin-top:14px;
      font-size:0.95rem;
    }
  </style>
</head>

<body>
<div class="wrap">
<div class="card">

<h2>Calculadora de distancia, tiempo y ritmo</h2>

<div class="grid-3">

<!-- DISTANCIA -->
<div class="block">
<div class="block-title">Distancia</div>

<div class="subgrid-2">
<input id="distanceKm" type="number" placeholder="km">
<input id="distanceM" type="number" placeholder="m">
</div>

<div class="quick-buttons">
<button data-km="5" data-m="0">5 km</button>
<button data-km="10" data-m="0">10 km</button>
<button data-km="21" data-m="97">Media</button>
<button data-km="42" data-m="195">Maratón</button>
</div>

</div>

<!-- TIEMPO -->
<div class="block">
<div class="block-title">Tiempo</div>

<div class="subgrid-3">
<input id="timeH" type="number" placeholder="h">
<input id="timeMin" type="number" placeholder="min">
<input id="timeSec" type="number" placeholder="s">
</div>

</div>

<!-- RITMO -->
<div class="block">
<div class="block-title">Ritmo</div>

<div class="subgrid-2">
<input id="paceMin" type="number" placeholder="min/km">
<input id="paceSec" type="number" placeholder="seg/km">
</div>

</div>

</div>

<!-- BOTONES -->
<div class="calc-row">
<button class="calc-btn" id="btnDistance">Calcular distancia</button>
<button class="calc-btn" id="btnTime">Calcular tiempo</button>
<button class="calc-btn" id="btnPace">Calcular ritmo</button>
</div>

<div class="actions">
<button id="clearAll">Borrar todo</button>
</div>

<div class="kpi" id="status">Pulsa un botón para calcular</div>

</div>
</div>

<script>

function v(id){
  const x = document.getElementById(id).value;
  return x===""?null:parseFloat(x);
}

function set(id,val){
  document.getElementById(id).value=val;
}

function highlight(ids){
  ids.forEach(id=>{
    let el=document.getElementById(id);
    el.classList.add("highlight");
    setTimeout(()=>el.classList.remove("highlight"),1200);
  });
}

function distance(){
  let km=v("distanceKm")||0;
  let m=v("distanceM")||0;
  if(km===0 && m===0) return null;
  return km + m/1000;
}

function time(){
  let h=v("timeH")||0;
  let m=v("timeMin")||0;
  let s=v("timeSec")||0;
  if(h===0 && m===0 && s===0) return null;
  return h + m/60 + s/3600;
}

function pace(){
  let m=v("paceMin")||0;
  let s=v("paceSec")||0;
  if(m===0 && s===0) return null;
  return m + s/60;
}

function setDistance(d){
  let total=Math.round(d*1000);
  set("distanceKm",Math.floor(total/1000));
  set("distanceM",total%1000);
  highlight(["distanceKm","distanceM"]);
}

function setTime(t){
  let sec=Math.round(t*3600);
  set("timeH",Math.floor(sec/3600));
  set("timeMin",Math.floor((sec%3600)/60));
  set("timeSec",sec%60);
  highlight(["timeH","timeMin","timeSec"]);
}

function setPace(p){
  let sec=Math.round(p*60);
  set("paceMin",Math.floor(sec/60));
  set("paceSec",sec%60);
  highlight(["paceMin","paceSec"]);
}

function msg(t){
  document.getElementById("status").innerText=t;
}

document.getElementById("btnDistance").onclick=()=>{
  let t=time(), p=pace();
  if(t && p){
    setDistance((t*60)/p);
    msg("Distancia calculada");
  }
};

document.getElementById("btnTime").onclick=()=>{
  let d=distance(), p=pace();
  if(d && p){
    setTime((d*p)/60);
    msg("Tiempo calculado");
  }
};

document.getElementById("btnPace").onclick=()=>{
  let d=distance(), t=time();
  if(d && t){
    setPace((t*60)/d);
    msg("Ritmo calculado");
  }
};

document.querySelectorAll(".quick-buttons button").forEach(b=>{
  b.onclick=()=>{
    set("distanceKm",b.dataset.km);
    set("distanceM",b.dataset.m);
    highlight(["distanceKm","distanceM"]);
  };
});

document.getElementById("clearAll").onclick=()=>{
  document.querySelectorAll("input").forEach(i=>i.value="");
  msg("Todo borrado");
};

</script>
</body>
</html>
